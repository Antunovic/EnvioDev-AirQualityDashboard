<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Analysis | EnvioDev</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { padding: 2rem; overflow-y: auto; background-color: var(--bg-color); color: var(--text-color); font-family: 'Outfit', sans-serif; }
        .controls-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-end;
            backdrop-filter: blur(10px);
        }
        .map-container {
            height: 450px;
            width: 100%;
            border-radius: 20px;
            margin-bottom: 2rem;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }
        #map { height: 100%; width: 100%; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 1.5rem; 
            width: 100%;
            box-sizing: border-box;
        }
        .chart-box { 
            background: var(--glass-bg); 
            padding: 1.5rem; 
            border-radius: 16px; 
            border: 1px solid var(--glass-border); 
            height: 350px; 
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }
        .chart-box:hover { transform: translateY(-5px); }
        .chart-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #4facfe;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-action { 
            padding: 12px 24px; 
            border-radius: 12px; 
            border: none; 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            color: white; 
            cursor: pointer; 
            font-weight: 700; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }
        .btn-action:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); }
        input, select {
            padding: 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
            border: 1px solid var(--glass-border);
            font-family: 'Outfit';
            outline: none;
            width: 100%;
        }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.75rem; color: #4facfe; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .control-group { flex: 1; min-width: 200px; }
        .section-header {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body class="dark-theme">
    <div style="max-width: 1450px; margin: 0 auto; width: 100%;">
        <div class="section-header">
            <div>
                <button class="btn-back" onclick="window.location.href='index.html'" style="padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: var(--text-color); cursor: pointer; transition: 0.3s; font-family: 'Outfit';">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </button>
                <h1 style="font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-top: 1rem; margin-bottom: 0.5rem;">Historical Analysis</h1>
                <p style="color: #a0a0a0; font-size: 0.95rem;">Track sensor trajectories and environmental trends over time</p>
            </div>
            <div onclick="toggleTheme()" style="display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 1.5rem; border-radius: 12px; cursor: pointer; transition: 0.3s; font-weight: 600; font-size: 0.9rem; background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(10px);">
                <i id="theme-icon" class="fas fa-sun" style="color: #ffea00; width: 20px; text-align: center;"></i>
                <span id="theme-text">Light Mode</span>
            </div>
        </div>
        
        <div class="controls-panel">
            <div class="control-group">
                <label>Target Node</label>
                <select id="hist-device-select">
                    <option value="1043c890-3256-11f1-b641-ab83ce7b9a6f">Enviodev device 1</option>
                    <option value="1df04d60-3256-11f1-a3ea-950631e217c8">Enviodev device 2</option>
                    <option value="2b8f8bc0-3256-11f1-b641-ab83ce7b9a6f">Enviodev device 3</option>
                    <option value="427b7740-3256-11f1-b641-ab83ce7b9a6f">Enviodev device 4</option>
                    <option value="4bfaf430-3256-11f1-b641-ab83ce7b9a6f">Enviodev device 5</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Range Start</label>
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="hist-start-date">
                    <input type="time" id="hist-start-time">
                </div>
            </div>
            
            <div class="control-group">
                <label>Range End</label>
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="hist-end-date">
                    <input type="time" id="hist-end-time">
                </div>
            </div>

            <button onclick="fetchHistoricalData()" class="btn-action">
                <i class="fas fa-search"></i> Analyze Timeline
            </button>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>
        
        <div id="hist-charts-grid" class="grid">
            <!-- 8 Metrics will appear here -->
             <div style="grid-column: 1/-1; text-align: center; padding: 5rem; color: #666;">
                 <i class="fas fa-chart-area fa-4x" style="opacity: 0.2; margin-bottom: 1rem;"></i>
                 <p>Select a range and click "Analyze Timeline" to generate report</p>
             </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="theme.js"></script>
    <script src="full_history.js"></script>
</body>
</html>
