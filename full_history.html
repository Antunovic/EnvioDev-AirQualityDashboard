<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Analysis | EnvioDev</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { padding: 2rem; overflow-y: auto; background-color: var(--bg-color); color: var(--text-color); }
        .controls-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 1.5rem; 
            width: 100%;
            box-sizing: border-box;
        }
        .chart-box { 
            background: var(--glass-bg); 
            padding: 1.5rem; 
            border-radius: 12px; 
            border: 1px solid var(--glass-border); 
            height: 350px; 
            box-shadow: var(--card-shadow);
        }
        .btn-action { 
            padding: 12px 24px; 
            border-radius: 10px; 
            border: none; 
            background: #4facfe; 
            color: white; 
            cursor: pointer; 
            font-weight: 600; 
            transition: 0.3s;
        }
        .btn-action:hover { opacity: 0.9; transform: translateY(-2px); }
        input, select {
            padding: 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: var(--text-color);
            border: 1px solid var(--glass-border);
            font-family: 'Outfit';
            outline: none;
        }
    </style>
</head>
<body class="dark-theme">
    <div style="max-width: 1400px; margin: 0 auto; width: 100%; text-align: left; padding-bottom: 2rem; padding-top: 1rem;">
        <button class="btn-back" onclick="window.location.href='index.html'" style="padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: var(--text-color); cursor: pointer; margin-bottom: 1.5rem;">
            <i class="fas fa-arrow-left"></i> Home Overview
        </button>
        <h1 style="font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 2rem;">Historical Data Analysis</h1>
        
        <div style="background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 1.5rem; border-radius: 20px; display: flex; flex-wrap: wrap; gap: 2rem; align-items: flex-end;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.8rem; color: #4facfe; font-weight: 600;">TARGET DEVICE</label>
                <select id="hist-device-select" style="width: auto; min-width: 220px; padding: 12px; border-radius: 10px;">
                    <option value="1043c890-3256-11f1-b641-ab83ce7b9a6f">Enviodev device 1</option>
                    <option value="1df04d60-3256-11f1-a3ea-950631e217c8">Enviodev device 2</option>
                    <option value="2b8f8bc0-3256-11f1-b641-ab83ce7b9a6f">Enviodev device 3</option>
                    <option value="427b7740-3256-11f1-b641-ab83ce7b9a6f">Enviodev device 4</option>
                    <option value="4bfaf430-3256-11f1-b641-ab83ce7b9a6f">Enviodev device 5</option>
                </select>
            </div>
            
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.8rem; color: #4facfe; font-weight: 600;">START DATE & TIME</label>
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="hist-start-date">
                    <input type="time" id="hist-start-time">
                </div>
            </div>
            
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.8rem; color: #4facfe; font-weight: 600;">END DATE & TIME</label>
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="hist-end-date">
                    <input type="time" id="hist-end-time">
                </div>
            </div>

            <button onclick="fetchHistoricalData()" class="btn-action">
                <i class="fas fa-chart-line"></i> Visualize Data
            </button>
        </div>
    </div>
    
    <div id="hist-charts-grid" class="grid" style="max-width: 1400px; margin-left: auto; margin-right: auto;">
        <!-- Charts will appear here -->
    </div>

    <script src="config.js"></script>
    <script src="theme.js"></script>
    <script src="full_history.js"></script>
</body>
</html>
