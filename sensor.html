<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Details</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { padding: 2rem; overflow-y: auto; background-color: #0c0e14; color: white;}
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-top: 2rem;}
        .chart-box { background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); height: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .btn-back { padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; cursor: pointer; transition: 0.3s;}
        .btn-back:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="dark-theme">
    <div style="max-width: 1400px; margin: 0 auto; width: 100%; text-align: left; padding-bottom: 2rem; padding-top: 1rem;">
        <button class="btn-back" onclick="window.location.href='index.html'" style="margin-bottom: 1.5rem;"><i class="fas fa-arrow-left"></i> Home Overview</button>
        <div>
            <h1 id="page-title" style="font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; color: white;"><i class="fas fa-microchip"></i> Loading Sensor...</h1>
        </div>
    </div>
    
    <div id="charts-grid" class="grid" style="max-width: 1400px; margin-left: auto; margin-right: auto;">
        <!-- Canvas charts will be injected here during parsing -->
    </div>

    <script src="config.js"></script>
    <script src="sensor.js"></script>
</body>
</html>
